<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS IA</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
<div class="sidebar">
<h2>NEXUS</h2>
<div id="chatList"></div>
</div>
<div class="chat">
<div id="messages"></div>
<div class="inputArea">
<input id="input" placeholder="Digite sua mensagem...">
<button id="sendBtn">Enviar</button>
</div>
</div>
</div>
<div id="notify" class="notify hidden">
<h3>NEXUS INFORMA</h3>
<p>Você precisa se registrar para salvar o seu histórico.</p>
<p>Caso não efetue o registro, não poderá utilizar esse chat.</p>
<button id="registerBtn">REGISTRAR ME</button>
</div>
<script src="js/app.js"></script>
</body>
</html>
