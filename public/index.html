<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS IA</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#000;color:#fff;display:flex;height:100vh;overflow:hidden}

/* CHAT */
.sidebar{width:260px;background:#0a0000;padding:15px}
.logo{font-size:20px;color:#ff0033}

.chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;padding:15px;overflow:auto}

.msg{margin-bottom:10px;padding:10px;border-radius:10px;max-width:70%;font-size:14px}
.user{background:#ff0033;margin-left:auto}
.bot{background:#1a0000}

.inputArea{display:flex;padding:8px;background:#050000}
input{flex:1;padding:10px;border:none;background:#0a0000;color:#fff;font-size:14px}
button{padding:10px 12px;margin-left:5px;background:#ff0033;color:#fff;border:none;cursor:pointer;font-size:13px}

/* OVERLAY COMPACTO */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
z-index:999;
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#0a0000;
padding:18px;
border-radius:8px;
width:260px;
display:flex;
flex-direction:column;
gap:8px;
text-align:center;
border:1px solid rgba(255,0,0,0.2);
}

.box h2{font-size:15px;margin:0}
.box p{font-size:11px;color:#aaa;margin:0}

.box input{
padding:8px;
font-size:13px;
background:#000;
border:1px solid #222;
color:#fff;
border-radius:6px;
}

.box button{
padding:9px;
font-size:12px;
background:#ff0033;
border:none;
border-radius:6px;
cursor:pointer;
}

.link{color:#ff0033;cursor:pointer;font-size:12px}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">NEXUS</div>
</div>

<div class="chat">
<div id="messages"></div>
<div class="inputArea">
<input id="input">
<button onclick="sendMessage()">Enviar</button>
</div>
</div>

<!-- REGISTRO -->
<div class="overlay" id="registerBox">
<div class="box">
<h2>Registre-se ↓</h2>

<input id="regUser" placeholder="👤 Usuário">
<input id="regPass" placeholder="🔑 Senha">

<p>👑 Login irrecuperável (Beta)</p>

<button onclick="saveRegister()">BAIXAR ARQUIVO</button>

<span class="link" onclick="showLogin()">Já possui login? Clique aqui</span>
</div>
</div>

<!-- LOGIN -->
<div class="overlay" id="loginBox">
<div class="box">
<input id="logUser" placeholder="💻 Usuário">
<input id="logPass" placeholder="💻 Senha">

<button onclick="login()">ENTRAR NO NEXUS</button>

<p id="error" style="color:red"></p>
</div>
</div>

<script>

// ===== SISTEMA DE SESSÃO =====
function checkAuth(){

const user = localStorage.getItem("user");
const lastLogin = localStorage.getItem("lastLogin");

// se nunca logou → registro
if(!user){
 showRegister();
 return;
}

// força logout aleatório (chance 20%)
if(Math.random() < 0.2){
 logout();
 showLogin();
 return;
}

// expira após 24h
if(lastLogin){
 const diff = Date.now() - parseInt(lastLogin);
 if(diff > 86400000){
  logout();
  showLogin();
  return;
 }
}

}

// ===== UI =====
function showRegister(){
document.getElementById("registerBox").style.display="flex";
}

function showLogin(){
document.getElementById("registerBox").style.display="none";
document.getElementById("loginBox").style.display="flex";
}

// ===== REGISTRO =====
function saveRegister(){
const user = regUser.value;
const pass = regPass.value;
if(!user || !pass) return;

let users = JSON.parse(localStorage.getItem("users")||"[]");
users.push({user,pass});
localStorage.setItem("users",JSON.stringify(users));

localStorage.setItem("user",user);
localStorage.setItem("lastLogin",Date.now());

// download
const blob = new Blob([`usuario:${user}\nsenha:${pass}`]);
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "login.txt";
a.click();

document.getElementById("registerBox").style.display="none";
}

// ===== LOGIN =====
function login(){
const user = logUser.value;
const pass = logPass.value;

const users = JSON.parse(localStorage.getItem("users")||"[]");
const ok = users.find(u=>u.user===user && u.pass===pass);

if(!ok){
 error.innerText="🚨 Login ou senha incorretos. Verifique e tente novamente.";
 return;
}

localStorage.setItem("user",user);
localStorage.setItem("lastLogin",Date.now());

document.getElementById("loginBox").style.display="none";
}

// ===== LOGOUT =====
function logout(){
localStorage.removeItem("user");
localStorage.removeItem("lastLogin");
}

// ===== CHAT =====
function sendMessage(){

if(!localStorage.getItem("user")){
 showLogin();
 return;
}

const input=document.getElementById("input");
const text=input.value;
if(!text)return;

addMessage(text,"user");
input.value="";

const el=addMessage("","bot");

fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})
.then(r=>r.json())
.then(d=> typeWriter(el,d.reply));
}

function typeWriter(el,text){
el.innerText="";
let i=0;

function t(){
 if(i<text.length){
  el.innerText+=text[i++];
  setTimeout(t,12);
 }
}
t();
}

function addMessage(text,type){
const d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
messages.appendChild(d);
return d;
}

// INIT
checkAuth();

</script>

</body>
</html>
