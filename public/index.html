<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS IA</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#000;color:#fff;display:flex;height:100vh;overflow:hidden}

.sidebar{width:280px;background:#0a0000;padding:15px;display:flex;flex-direction:column}
.logo{font-size:22px;color:#ff0033;margin-bottom:15px}

.chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;padding:20px;overflow:auto}

.msg{margin-bottom:15px;padding:12px;border-radius:12px;max-width:70%}
.user{background:#ff0033;margin-left:auto}
.bot{background:#1a0000}

.inputArea{display:flex;padding:10px;background:#050000}
input{flex:1;padding:12px;border:none;background:#0a0000;color:#fff}
button{padding:12px;margin-left:5px;background:#ff0033;color:#fff;border:none;cursor:pointer}

/* OVERLAY */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
z-index:999;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.overlay input{
margin:5px;
padding:10px;
width:250px;
}

.link{color:#ff0033;cursor:pointer}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">NEXUS</div>
</div>

<div class="chat">
<div id="messages"></div>
<div class="inputArea">
<input id="input">
<button onclick="sendMessage()">Enviar</button>
</div>
</div>

<!-- REGISTER -->
<div class="overlay" id="registerBox">
<h2>Registre-se abaixo ↓↓↓</h2>

<input id="regUser" placeholder="👤Crie aqui seu usuário:">
<input id="regPass" placeholder="🔑 Crie aqui sua senha:">

<p>👑 O login é irrecuperável pois o site ainda está em fase Beta.</p>

<button onclick="saveRegister()"><<<<<<<<<<<<<<<<< BAIXAR ARQUIVO >>>>>>>>>>>>>>>></button>

<p>Já possui login? <span class="link" onclick="showLogin()">Clique aqui</span></p>
</div>

<!-- LOGIN -->
<div class="overlay" id="loginBox">
<input id="logUser" placeholder="💻 Digite o usuário que você criou:">
<input id="logPass" placeholder="💻 Digite a senha que você criou:">

<button onclick="login()">🤸‍♂️ ENTRAR NO NEXUS 🤸‍♂️</button>

<p id="error" style="color:red"></p>
</div>

<script>

// ===== AUTH =====
function checkAuth(){
if(!localStorage.getItem("user")){
 document.getElementById("registerBox").style.display="flex";
}
}

function saveRegister(){
const user = document.getElementById("regUser").value;
const pass = document.getElementById("regPass").value;

if(!user || !pass) return;

let users = JSON.parse(localStorage.getItem("users")||"[]");
users.push({user,pass});
localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("user",user);

// download arquivo
const blob = new Blob([`usuario:${user}\nsenha:${pass}`],{type:"text/plain"});
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "login.txt";
a.click();

document.getElementById("registerBox").style.display="none";
}

function showLogin(){
document.getElementById("registerBox").style.display="none";
document.getElementById("loginBox").style.display="flex";
}

function login(){
const user = document.getElementById("logUser").value;
const pass = document.getElementById("logPass").value;

const users = JSON.parse(localStorage.getItem("users")||"[]");
const ok = users.find(u=>u.user===user && u.pass===pass);

if(!ok){
document.getElementById("error").innerText="🚨 Login ou senha incorretos. Verifique e tente novamente.";
return;
}

localStorage.setItem("user",user);
document.getElementById("loginBox").style.display="none";
}

// ===== CHAT =====
function sendMessage(){
if(!localStorage.getItem("user")){
 document.getElementById("registerBox").style.display="flex";
 return;
}

const input=document.getElementById("input");
const text=input.value;
if(!text)return;

addMessage(text,"user");
input.value="";

const el=addMessage("","bot");

fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})
.then(r=>r.json())
.then(d=>{
 typeWriter(el,d.reply);
});
}

function typeWriter(el,text){
el.innerText="";
let i=0;

function type(){
 if(i<text.length){
  el.innerText += text[i];
  i++;
  setTimeout(type,15);
 }
}
type();
}

function addMessage(text,type){
const d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
document.getElementById("messages").appendChild(d);
return d;
}

// INIT
checkAuth();

</script>

</body>
</html>
