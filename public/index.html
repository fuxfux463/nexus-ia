<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS IA</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f5f9ff;color:#111;display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:240px;
background:#ffffff;
border-right:1px solid #ddd;
padding:10px;
display:flex;
flex-direction:column;
}

.logo{
font-size:26px;
font-weight:bold;
color:#007bff;
display:flex;
align-items:center;
gap:5px;
}

/* lâmpada animada */
.bulb{
animation:blink 1s infinite;
}
@keyframes blink{
0%,100%{opacity:1}
50%{opacity:0.3}
}

.menu button{
margin-top:5px;
padding:8px;
background:#007bff;
color:#fff;
border:none;
cursor:pointer;
font-size:13px;
}

/* CHAT LIST */
.chatList{flex:1;overflow:auto;margin-top:10px}
.chatItem{
padding:6px;
border-bottom:1px solid #eee;
cursor:pointer;
font-size:13px;
}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;padding:10px;overflow:auto}

.msg{
margin-bottom:8px;
padding:8px;
border-radius:8px;
max-width:70%;
font-size:13px;
}

.user{background:#007bff;color:#fff;margin-left:auto}
.bot{background:#e9f1ff}

.inputArea{
display:flex;
padding:8px;
background:#fff;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:8px;
border:1px solid #ccc;
}

button{
padding:8px;
margin-left:5px;
background:#007bff;
color:#fff;
border:none;
cursor:pointer;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.box{
background:#fff;
padding:15px;
border-radius:8px;
width:250px;
display:flex;
flex-direction:column;
gap:8px;
text-align:center;
}

.box input{padding:6px}
.box button{background:#007bff;color:#fff;border:none;padding:6px}
.link{color:#007bff;cursor:pointer;font-size:12px}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">NEXUS <span class="bulb">💡</span></div>

<div class="menu">
<button onclick="newChat()">Novo Chat</button>
<button onclick="clearChats()">Limpar Chats</button>
<button onclick="shareCurrent()">Compartilhar Chat</button>
</div>

<div class="chatList" id="chatList"></div>
</div>

<div class="chat">
<div id="messages"></div>

<div class="inputArea">
<input id="input">
<button onclick="sendMessage()">Enviar</button>
</div>
</div>

<!-- LOGIN -->
<div class="overlay" id="loginBox">
<div class="box">
<input id="user" placeholder="Usuário">
<input id="pass" placeholder="Senha">
<button onclick="login()">Entrar</button>
<p id="error"></p>
</div>
</div>

<script>

// ===== AUTH =====
function checkAuth(){
if(!localStorage.getItem("user")){
loginBox.style.display="flex";
}
}

function login(){
localStorage.setItem("user",user.value);
loginBox.style.display="none";
}

// ===== CHAT =====
let chats = JSON.parse(localStorage.getItem("chats")||"[]");
let currentChat=null;

function saveChats(){
localStorage.setItem("chats",JSON.stringify(chats));
renderChats();
}

function renderChats(){
chatList.innerHTML="";
chats.forEach((c,i)=>{
const div=document.createElement("div");
div.className="chatItem";
div.innerText=c.title;
div.onclick=()=>loadChat(i);
chatList.appendChild(div);
});
}

function newChat(){
currentChat={title:"Novo Chat",messages:[]};
chats.unshift(currentChat);
saveChats();
loadChat(0);
}

function clearChats(){
const opt = prompt("Digite:\n1 - apagar todos\n2 - apagar por índice");

if(opt==="1"){
chats=[];
}
else if(opt==="2"){
const i = prompt("Digite o índice:");
chats.splice(i,1);
}

saveChats();
messages.innerHTML="";
}

function loadChat(i){
currentChat=chats[i];
messages.innerHTML="";
currentChat.messages.forEach(m=>addMessage(m.text,m.type));
}

function sendMessage(){
if(!localStorage.getItem("user")){
loginBox.style.display="flex";
return;
}

const text=input.value;
if(!text)return;

addMessage(text,"user");
saveMsg(text,"user");
input.value="";

const el=addMessage("","bot");

fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})
.then(r=>r.json())
.then(d=>{
el.innerText=d.reply;
saveMsg(d.reply,"bot");
});
}

function saveMsg(text,type){
if(!currentChat)newChat();
currentChat.messages.push({text,type});
if(currentChat.messages.length===1)currentChat.title=text.slice(0,20);
saveChats();
}

function addMessage(text,type){
const d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
messages.appendChild(d);
return d;
}

// ===== SHARE =====
function generateId(){
return Math.random().toString(36).substring(2,10);
}

function shareCurrent(){
if(!currentChat) return;

const id = generateId();
localStorage.setItem("share_"+id, JSON.stringify(currentChat));

const link = location.origin + location.pathname + "?chat=" + id;

navigator.clipboard.writeText(link);
alert("Link copiado!");
}

// carregar link
function loadShared(){
const params = new URLSearchParams(location.search);
const id = params.get("chat");

if(id){
const data = localStorage.getItem("share_"+id);
if(data){
const chat = JSON.parse(data);
messages.innerHTML="";
chat.messages.forEach(m=>addMessage(m.text,m.type));
}
}
}

// INIT
checkAuth();
renderChats();
loadShared();

</script>

</body>
</html>
