<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS IA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body{font-family:'Orbitron', monospace; height:100vh; overflow:hidden; position:relative; background:#0a0a0a; color:#fff; display:flex; transition:filter 0.3s ease, background 0.3s ease;}

/* FUNDO ESPACIAL */
.space-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:radial-gradient(ellipse at bottom,#1b2735 0%,#090a0f 100%);overflow:hidden; transition:background 0.5s ease;}
.stars{position:absolute;top:0;left:0;width:100%;height:100%;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite ease-in-out;}
.star:nth-child(odd){animation-delay:0s;}
.star:nth-child(even){animation-delay:1.5s;}
@keyframes twinkle{0%,100%{opacity:0.3;transform:scale(1);}50%{opacity:1;transform:scale(1.2);}}

.nebula{position:absolute;border-radius:50%;filter:blur(1px);opacity:0.1;}
.nebula1{top:20%; left:10%; width:300px; height:300px; background:radial-gradient(circle, rgba(120,119,198,0.8) 0%, transparent 70%); animation:nebulaFloat 20s infinite linear;}
.nebula2{top:60%; right:20%; width:400px; height:400px; background:radial-gradient(circle, rgba(255,0,150,0.6) 0%, transparent 70%); animation:nebulaFloat 25s infinite linear reverse;}
.nebula3{bottom:10%; left:30%; width:250px; height:250px; background:radial-gradient(circle, rgba(0,255,255,0.5) 0%, transparent 70%); animation:nebulaFloat 30s infinite linear;}
@keyframes nebulaFloat{0%{transform:translate(0,0) rotate(0deg);}25%{transform:translate(30px,-20px) rotate(90deg);}50%{transform:translate(60px,0) rotate(180deg);}75%{transform:translate(30px,20px) rotate(270deg);}100%{transform:translate(0,0) rotate(360deg);}}

.planets{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); animation:planetOrbit 40s infinite linear;}
.planet{position:absolute;border-radius:50%;}
.planet1{width:120px;height:120px; background:radial-gradient(circle at 30% 30%,#ff6b6b,#ee5a52,#c44569); box-shadow:0 0 50px rgba(255,107,107,0.5); animation:planetRotate 15s infinite linear;}
.planet2{top:20px; right:-40px; width:60px;height:60px; background:radial-gradient(circle at 40% 40%,#4ecdc4,#44a08d); box-shadow:0 0 30px rgba(78,205,196,0.6); animation:planetRotate 20s infinite linear reverse;}
@keyframes planetOrbit{0%{transform:translate(-50%,-50%) rotate(0deg) translateX(200px) rotate(0deg);}100%{transform:translate(-50%,-50%) rotate(360deg) translateX(200px) rotate(-360deg);}}
@keyframes planetRotate{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* SCROLL */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background: rgba(255,255,255,0.05);}
::-webkit-scrollbar-thumb{background: linear-gradient(145deg, #007bff, #00d4ff); border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background: linear-gradient(145deg, #00d4ff, #007bff);}

/* GLASSMORPHISM */
.glass{background: rgba(255,255,255,0.1); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.2); box-shadow:0 8px 32px rgba(0,0,0,0.5);}

/* SIDEBAR */
.sidebar{background:linear-gradient(145deg, rgba(0,123,255,0.15), rgba(0,123,255,0.05)); border-right:1px solid rgba(0,123,255,0.3); display:flex; flex-direction:column; padding:20px; flex-shrink:0; width:280px; transition:all 0.4s; overflow:hidden; position:relative;}
.logo{font-size:32px; font-weight:900; background: linear-gradient(45deg,#007bff,#00d4ff,#007bff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; display:flex; align-items:center; gap:10px; margin-bottom:20px;}
.bulb{animation:pulseGlow 2s infinite; filter:drop-shadow(0 0 10px #00ff88);}
@keyframes pulseGlow{0%,100%{transform:scale(1);filter:drop-shadow(0 0 10px #00ff88);}50%{transform:scale(1.1);filter:drop-shadow(0 0 20px #00ff88);}}

/* MENU BOTÕES */
.menu button{margin-top:8px;padding:12px 16px;background:linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); color:#fff; border:1px solid rgba(255,255,255,0.2); cursor:pointer; font-size:14px; width:100%; border-radius:12px; transition:all 0.3s;}
.menu button:hover{background:linear-gradient(145deg, rgba(0,123,255,0.3), rgba(0,123,255,0.1)); transform:translateY(-2px); box-shadow:0 10px 25px rgba(0,123,255,0.3);}

/* CHAT LIST */
.chatList{flex:1; overflow:auto; margin-top:20px; display:flex; flex-direction:column; gap:8px; padding-right:10px;}
.chatItem{padding:12px 16px; border:2px solid rgba(0,123,255,0.3); border-radius:12px; cursor:pointer; font-size:14px; transition:all 0.3s;}
.chatItem:hover{background: rgba(0,123,255,0.15); border-color:#00d4ff;}

/* CHAT */
.chat{flex:1; display:flex; flex-direction:column; position:relative;}
#messages{flex:1; padding:20px; overflow:auto; scroll-behavior:smooth;}
.msg{margin-bottom:12px; padding:16px 20px; border-radius:20px; max-width:70%; font-size:14px; word-wrap:break-word; position:relative;}
.user{background:linear-gradient(145deg,#007bff,#0056b3); margin-left:auto; border-bottom-right-radius:4px; box-shadow:0 8px 20px rgba(0,123,255,0.3);}
.bot{background:linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05)); border-bottom-left-radius:4px; box-shadow:0 4px 15px rgba(0,0,0,0.3);}

/* INPUT AREA */
.inputArea{display:flex; padding:20px; background:linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)); border-top:1px solid rgba(255,255,255,0.1);}
.inputArea input{flex:1; padding:16px 20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:#fff; border-radius:25px; font-size:14px;}
.inputArea button{padding:16px 20px; margin-left:12px; background:linear-gradient(145deg,#00ff88,#00cc6a); color:#000; border:none; cursor:pointer; font-size:14px; font-weight:700; border-radius:25px;}
.inputArea button:hover{transform:translateY(-3px) scale(1.05);}
.stopBtn{background:linear-gradient(145deg,#ff5555,#cc0000); color:#fff; margin-left:8px;}

/* OVERLAY LOGIN / REGISTER - FULLSCREEN COM BLUR */
.overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content: center;
    align-items: center;
    z-index:10;
}
.overlay.active { display:flex; background: rgba(0,0,0,0.6); backdrop-filter:blur(6px); }
.box {
    width:100%;
    max-width:400px;
    padding:40px;
    border-radius:16px;
    display:flex;
    flex-direction:column;
    gap:16px;
    background: rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
}

/* RESPONSIVO */
@media(max-width:768px){
    body{flex-direction:column;}
    .sidebar{width:100%; flex-direction:row; overflow-x:auto; padding:15px;}
    .chat{flex:1;width:100%;}
    .chatList{flex-direction:row;margin-top:0;gap:10px;overflow-x:auto;}
    .chatItem{border-right:2px solid rgba(0,123,255,0.5); white-space:nowrap; flex-shrink:0;}
    .inputArea{flex-direction:column;}
    .inputArea input{margin-bottom:12px;width:100%;}
    .inputArea button{width:100%; margin-left:0;}
}
</style>
</head>
<body>

<!-- FUNDO ESPACIAL -->
<div class="space-bg" id="spaceBg">
    <div class="stars" id="stars"></div>
    <div class="nebula nebula1"></div>
    <div class="nebula nebula2"></div>
    <div class="nebula nebula3"></div>
    <div class="planets">
        <div class="planet planet1"></div>
        <div class="planet planet2"></div>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar glass">
    <div class="logo">NEXUS <span class="bulb">💫</span></div>
    <div class="menu">
        <button onclick="logout()">⏏️ Sair</button>
        <button onclick="newChat()">🌌 Novo Chat</button>
        <button onclick="clearChats()">🗑️ Limpar Chats</button>
    </div>
    <div class="chatList" id="chatList"></div>
</div>

<!-- CHAT -->
<div class="chat glass">
    <div id="messages"></div>
    <div class="inputArea glass">
        <input id="input" placeholder="Digite sua mensagem para a IA espacial... 🚀">
        <button id="sendBtn">Enviar 💬</button>
        <button id="stopBtn" class="stopBtn" style="display:none;">Parar ❌</button>
    </div>
</div>

<!-- LOGIN / REGISTER -->
<div class="overlay" id="registerBox">
    <div class="box">
        <h3>🚀 Registro Nexus IA</h3>
        <input id="regUser" placeholder="Usuário">
        <input id="regPass" type="password" placeholder="Senha">
        <button onclick="register()">⭐ Registrar</button>
        <span class="link" onclick="showLogin()">Já possui login? Clique aqui</span>
    </div>
</div>

<div class="overlay" id="loginBox">
    <div class="box">
        <h3>🌠 Acesse o Nexus</h3>
        <input id="user" placeholder="Usuário">
        <input id="pass" type="password" placeholder="Senha">
        <button onclick="login()">🚀 Entrar</button>
        <p id="error"></p>
        <span class="link" onclick="showRegister()">Não tem conta? Registrar</span>
    </div>
</div>

<script>
// ===== CRIAÇÃO DAS ESTRELAS =====
function createStars(){
    const starsContainer = document.getElementById('stars');
    for(let i=0;i<200;i++){
        const star=document.createElement('div');
        star.className='star';
        star.style.left=Math.random()*100+'%';
        star.style.top=Math.random()*100+'%';
        star.style.width=Math.random()*3+'px';
        star.style.height=star.style.width;
        star.style.animationDelay=Math.random()*3+'s';
        star.style.animationDuration=(Math.random()*3+2)+'s';
        starsContainer.appendChild(star);
    }
}

// ===== AUTH =====
function checkAuth(){
    const users=JSON.parse(localStorage.getItem("users")||"[]");
    if(users.length===0){ showOverlay('registerBox'); } 
    else if(!localStorage.getItem("user")){ showOverlay('loginBox'); }
}

function showOverlay(id){
    document.getElementById(id).classList.add('active');
    document.getElementById('spaceBg').style.filter = 'blur(6px)';}

function hideOverlay(id){
    document.getElementById(id).classList.remove('active'); // esconde o overlay
    document.getElementById('spaceBg').style.filter = 'none'; // remove o blur do fundo
}

function register(){
    const u=document.getElementById('regUser').value;
    const p=document.getElementById('regPass').value;
    if(!u||!p) return alert("Preencha todos os campos!");
    let users=JSON.parse(localStorage.getItem("users")||"[]");
    if(users.find(x=>x.user===u)) return alert("Usuário já existe!");
    users.push({user:u,pass:p});
    localStorage.setItem("users",JSON.stringify(users));
    alert("Registro realizado!");
    hideOverlay('registerBox');
    showOverlay('loginBox');
}

function login(){
    const u=document.getElementById('user').value;
    const p=document.getElementById('pass').value;
    let users=JSON.parse(localStorage.getItem("users")||"[]");
    const found=users.find(x=>x.user===u&&x.pass===p);
    if(found){ 
        localStorage.setItem("user",u); 
        hideOverlay('loginBox');
        loadChats();
    } else{ document.getElementById('error').textContent="Usuário ou senha incorretos!"; }
}

function showRegister(){ hideOverlay('loginBox'); showOverlay('registerBox'); }
function showLogin(){ hideOverlay('registerBox'); showOverlay('loginBox'); }

// ===== CHAT =====
let currentChatId=null;
let typingInterval=null;
const messagesDiv=document.getElementById('messages');
const input=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');
const stopBtn=document.getElementById('stopBtn');
const chatList=document.getElementById('chatList');
const spaceBg=document.getElementById('spaceBg');

function getChats(){ 
    const user=localStorage.getItem('user'); 
    return JSON.parse(localStorage.getItem('chats_'+user)||'[]'); 
}
function saveChats(chats){ 
    const user=localStorage.getItem('user'); 
    localStorage.setItem('chats_'+user,JSON.stringify(chats)); 
}

function loadChats(){
    chatList.innerHTML='';
    const chats=getChats();
    chats.forEach(chat=>{
        const div=document.createElement('div');
        div.className='chatItem';
        div.textContent=chat.title;
        div.onclick=()=>{ loadChat(chat.id); };
        chatList.appendChild(div);
    });
    if(chats.length>0) loadChat(chats[chats.length-1].id);
}

function loadChat(id){
    currentChatId=id;
    messagesDiv.innerHTML='';
    const chats=getChats();
    const chat=chats.find(c=>c.id===id);
    if(chat) chat.messages.forEach(m=>appendMessage(m.text,m.sender));
}

function newChat(){
    const chats=getChats();
    const id=Date.now();
    const title='Chat '+(chats.length+1);
    chats.push({id,title,messages:[]});
    saveChats(chats);
    loadChats();
}

function clearChats(){
    if(confirm('Deseja limpar todos os chats?')){
        localStorage.removeItem('chats_'+localStorage.getItem('user'));
        chatList.innerHTML='';
        messagesDiv.innerHTML='';
        currentChatId=null;
    }
}

function appendMessage(text,sender){
    const msg=document.createElement('div');
    msg.className='msg '+sender;
    messagesDiv.appendChild(msg);
    messagesDiv.scrollTop=messagesDiv.scrollHeight;
    if(sender==='bot'){
        spaceBg.style.transition='background 0.2s';
        spaceBg.style.background='radial-gradient(ellipse at bottom,#ff00ff 0%,#0a0a0a 100%)';
        setTimeout(()=>{ spaceBg.style.background='radial-gradient(ellipse at bottom,#1b2735 0%,#090a0f 100%)'; },200);
        typeWriter(msg,text);
    } else {
        msg.innerHTML=marked.parse(text);
    }
}

// ===== TYPING EFFECT =====
function typeWriter(el,text){
    let i=0;
    stopBtn.style.display='inline-block';
    typingInterval=setInterval(()=>{
        el.innerHTML=marked.parse(text.substring(0,i));
        messagesDiv.scrollTop=messagesDiv.scrollHeight;
        i++;
        if(i>text.length){ clearInterval(typingInterval); stopBtn.style.display='none'; }
    },25);
}

// ===== SEND MESSAGE =====
sendBtn.onclick=sendMessage;
input.addEventListener('keydown',e=>{ if(e.key==='Enter') sendMessage(); });

async function sendMessage(){
    const t=input.value.trim();
    if(!t) return;
    appendMessage(t,'user');
    if(currentChatId===null) newChat();
    input.value=''; sendBtn.disabled=true;

    // Simulação resposta bot
    setTimeout(()=>{
        const reply="IA: processando sua mensagem... 🚀";
        appendMessage(reply,'bot');
        const chats=getChats();
        const chat=chats.find(c=>c.id===currentChatId);
        chat.messages.push({text:t,sender:'user'});
        chat.messages.push({text:reply,sender:'bot'});
        saveChats(chats);
        sendBtn.disabled=false;
    },500);
}

stopBtn.onclick=function(){ clearInterval(typingInterval); stopBtn.style.display='none'; };

// ===== STAR CREATION & AUTH INIT =====
window.addEventListener('load', function() {
    createStars();
    checkAuth();
    if(localStorage.getItem('user')) loadChats();
});

function logout() {
    localStorage.removeItem("user");     
    location.reload();                    
}
</script>

</body>
</html>
