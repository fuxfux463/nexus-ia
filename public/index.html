<body>

<div id="space-bg"></div>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">NEXUS <span class="bulb">💡</span></div>

<div class="menu">
<button onclick="newChat()">Novo Chat</button>
<button onclick="clearChats()">Limpar Chats</button>
<button onclick="shareCurrent()">Compartilhar Chat</button>
</div>

<div class="chatList" id="chatList"></div>
</div>

<!-- CHAT -->
<div class="chat">
<div id="messages"></div>
<div class="inputArea">
<input id="input" placeholder="DIGITE AQUI SUA MENSAGEM...">
<button onclick="sendMessage()">Enviar</button>
</div>
</div>

<!-- REGISTER -->
<div class="overlay" id="registerBox">
<div class="box">
<h3>Registre-se ↓</h3>
<input id="regUser" placeholder="Usuário">
<input id="regPass" placeholder="Senha">
<button onclick="register()">BAIXAR ARQUIVO</button>
<span class="link" onclick="showLogin()">Já possui login? Clique aqui</span>
</div>
</div>

<!-- LOGIN -->
<div class="overlay" id="loginBox">
<div class="box">
<input id="user" placeholder="Usuário">
<input id="pass" placeholder="Senha">
<button onclick="login()">Entrar</button>
<p id="error" style="color:red;font-size:12px"></p>
</div>
</div>

<script>
// (continua lógica igual do exemplo anterior...)
function checkAuth(){const users=JSON.parse(localStorage.getItem("users")||"[]");if(users.length===0){registerBox.style.display="flex";}else if(!localStorage.getItem("user")){loginBox.style.display="flex";}}
function register(){const u=regUser.value,p=regPass.value;if(!u||!p)return;let users=JSON.parse(localStorage.getItem("users")||"[]");users.push({user:u,pass:p});localStorage.setItem("users",JSON.stringify(users));localStorage.setItem("user",u);const blob=new Blob([`user:${u}\npass:${p}`]);const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="login.txt";a.click();registerBox.style.display="none";}
function showLogin(){registerBox.style.display="none";loginBox.style.display="flex";}
function login(){const u=user.value,p=pass.value;const users=JSON.parse(localStorage.getItem("users")||"[]");const ok=users.find(x=>x.user===u&&x.pass===p);if(!ok){error.innerText="🚨 Login ou senha incorretos";return;}localStorage.setItem("user",u);loginBox.style.display="none";}
let chats=JSON.parse(localStorage.getItem("chats")||"[]"),currentChat=null;
function saveChats(){localStorage.setItem("chats",JSON.stringify(chats));renderChats();}
function renderChats(){chatList.innerHTML="";chats.forEach((c,i)=>{const d=document.createElement("div");d.className="chatItem";d.innerText=c.title;d.onclick=()=>loadChat(i);chatList.appendChild(d);});}
function newChat(){currentChat={title:"Novo Chat",messages:[]};chats.unshift(currentChat);saveChats();loadChat(0);}
function clearChats(){if(confirm("Deseja apagar todos os chats?")){chats=[];saveChats();messages.innerHTML="";}}
function loadChat(i){currentChat=chats[i];messages.innerHTML="";currentChat.messages.forEach(m=>addMessage(m.text,m.type));}
function sendMessage(){if(!localStorage.getItem("user")){loginBox.style.display="flex";return;}const t=input.value;if(!t)return;addMessage(t,"user");saveMsg(t,"user");input.value="";const el=addMessage("","bot");fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:t})}).then(r=>r.json()).then(d=>{el.innerText=d.reply;saveMsg(d.reply,"bot");});}
function saveMsg(t,type){if(!currentChat)newChat();currentChat.messages.push({text:t,type});if(currentChat.messages.length===1)currentChat.title=t.slice(0,20);saveChats();}
function addMessage(t,type){const d=document.createElement("div");d.className="msg "+type;d.innerText=t;messages.appendChild(d);return d;}
function generateId(){return Math.random().toString(36).substring(2,10);}
function shareCurrent(){if(!currentChat)return;const id=generateId();localStorage.setItem("share_"+id,JSON.stringify(currentChat));const link=location.origin+location.pathname+"?chat="+id;navigator.clipboard.writeText(link);alert("Link copiado!");}
function loadShared(){const params=new URLSearchParams(location.search);const id=params.get("chat");if(id){const data=localStorage.getItem("share_"+id);if(data){const chat=JSON.parse(data);messages.innerHTML="";chat.messages.forEach(m=>addMessage(m.text,m.type));}}}
checkAuth();renderChats();loadShared();
</script>
